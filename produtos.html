<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - SIM</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-drumstick-bite"></i> Registro de Produtos</div>
        <div>
            <a href="dashboard.html" class="btn-primary" style="text-decoration: none; font-size: 0.9rem;">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="card mb-20" style="border-left: 5px solid #e67e22;">
            <h2 id="tituloEmpresa">Carregando...</h2>
            <p id="subtituloEmpresa">...</p>
        </div>

        <div class="card mb-20">
            <h3><i class="fas fa-plus"></i> Novo Produto</h3>
            <form id="produtoForm">
                <div class="row">
                    <div class="form-group">
                        <label>Nº Registro do Produto</label>
                        <input type="text" id="numRegistroProd" placeholder="Ex: 001/005" required>
                    </div>
                    <div class="form-group">
                        <label>Marca</label>
                        <input type="text" id="marcaProd" placeholder="Ex: D'Sítio">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="nomeProd" placeholder="Ex: Linguiça Toscana Frescal" required>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Tipo de Embalagem</label>
                        <input type="text" id="embalagemProd" placeholder="Ex: Saco Plástico a Vácuo">
                    </div>
                    <div class="form-group">
                        <label>Apresentação / Peso</label>
                        <input type="text" id="pesoProd" placeholder="Ex: 500g, 1kg, A granel">
                    </div>
                </div>

                <button type="submit" class="btn-success">
                    <i class="fas fa-save"></i> Salvar Produto
                </button>
            </form>
        </div>

        <div class="card">
            <h3><i class="fas fa-boxes"></i> Produtos Registrados</h3>
            <div class="table-responsive">
                <table id="tabelaProdutos">
                    <thead>
                        <tr>
                            <th>Reg.</th>
                            <th>Produto</th>
                            <th>Marca</th>
                            <th>Embalagem/Peso</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
