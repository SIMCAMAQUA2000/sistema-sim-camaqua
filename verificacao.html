<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação Oficial - SIM Camaquã</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --success: #27ae60; --primary: #2c3e50; --bg: #f0f2f5; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; width: 100%; max-width: 450px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border-top: 5px solid var(--success); }
        .header { background: #e8f8f0; padding: 30px 20px; text-align: center; border-bottom: 1px solid #eee; }
        .icon { width: 80px; height: 80px; background: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: white; font-size: 40px; }
        .body { padding: 25px; }
        .group { margin-bottom: 15px; border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; }
        .label { font-size: 0.75rem; color: #999; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }
        .value { font-size: 1.1rem; color: var(--primary); font-weight: 500; word-break: break-word; }
        .footer { background: #f9f9f9; padding: 15px; text-align: center; font-size: 0.8rem; color: #777; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="icon"><i class="fas fa-check"></i></div>
            <h2 style="color:var(--success); margin:0;">DOCUMENTO VÁLIDO</h2>
            <p style="color:#777; margin:5px 0 0;">Serviço de Inspeção Municipal</p>
        </div>
        <div class="body">
            <div class="group"><span class="label">Estabelecimento</span><div class="value" id="nome">...</div></div>
            <div class="group"><span class="label">Documento (CNPJ/CPF)</span><div class="value" id="doc">...</div></div>
            <div class="group"><span class="label">Registro SIM</span><div class="value" id="sim">...</div></div>
            <div class="group"><span class="label">Situação</span><div class="value" id="status" style="color:var(--success); font-weight:bold;">ATIVO</div></div>
            <div class="group"><span class="label">Consultado em</span><div class="value" id="data"></div></div>
        </div>
        <div class="footer"><i class="fas fa-shield-alt"></i> Autenticidade Garantida - SIM Camaquã</div>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('nome').textContent = p.get('nome') || '-';
        document.getElementById('doc').textContent = p.get('cnpj') || '-';
        document.getElementById('sim').textContent = p.get('sim') || '-';
        const st = p.get('status') || 'Ativo';
        const elSt = document.getElementById('status');
        elSt.textContent = st.toUpperCase();
        
        if(st.toLowerCase() !== 'ativo') {
            elSt.style.color = '#c0392b';
            document.querySelector('.card').style.borderTopColor = '#c0392b';
            document.querySelector('.icon').style.background = '#c0392b';
            document.querySelector('.icon i').className = 'fas fa-times';
            document.querySelector('h2').textContent = "SITUAÇÃO IRREGULAR";
            document.querySelector('h2').style.color = '#c0392b';
        }
        document.getElementById('data').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
